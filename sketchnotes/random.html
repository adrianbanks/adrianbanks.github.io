<!DOCTYPE html>
<html>
    <head>
        <title>Random Sketchnote</title>
        <link href="../assets/resources/font-awesome/css/fontawesome.min.css" rel="stylesheet">
        <link href="../assets/resources/font-awesome/css/solid.min.css" rel="stylesheet">
        <link href="./style.css" rel="stylesheet">
        <style>
            h1 {
                margin: 10px 0 10px 0;
            }

            #container {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
            }

            #carousel-wrapper {
                width: 750px;
                height: 460px;
                overflow: hidden;
                border: 3px solid #333333;
                border-radius: 8px;
                box-shadow: rgba(0,0,0,.4) 0 4px 12px;
                position: relative;
                background-color: #f5f5f5;
            }

            #carousel {
                display: flex;
                flex-direction: column;
                transition: transform 0.1s linear;
            }

            .carousel-item {
                width: 750px;
                height: 460px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                padding: 20px;
                box-sizing: border-box;
            }

            .carousel-item a {
                display: block;
                width: 100%;
                height: 100%;
            }

            .carousel-item img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                border: 1px solid #999999;
                background-color: white;
            }

            #spin-button {
                margin-top: 30px;
                padding: 15px 40px;
                font-size: 18px;
                font-weight: bold;
                background-color: #333333;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: background-color 0.2s;
            }

            #spin-button:hover:not([disabled]) {
                background-color: #555555;
            }

            #spin-button:disabled {
                background-color: #999999;
                cursor: not-allowed;
            }

            #spin-button i {
                margin-right: 8px;
            }

            #current-title {
                margin-top: 20px;
                font-size: 16px;
                font-weight: bold;
                text-align: center;
                max-width: 750px;
            }

            #current-speaker {
                margin-top: 5px;
                font-size: 14px;
                color: #666666;
                text-align: center;
            }
        </style>
    </head>

    <body>
        <div id="banner">
            <a href="index.html" title="Go to sketchnotes"><img src="../android-icon-48x48.png"></a>
            <div id="banner-content">
                <h1>Random Sketchnote</h1>
            </div>
        </div>

        <div id="container">
            <div id="carousel-wrapper">
                <div id="carousel"></div>
            </div>

            <div id="current-title"></div>
            <div id="current-speaker"></div>

            <button id="spin-button">
                <i class="fa-solid fa-shuffle"></i>
                Spin
            </button>
        </div>

        <script>
            const ITEM_HEIGHT = 460;
            const SPIN_DURATION = 800;

            let sketchnotes = [];
            let rootPath = '';
            let isSpinning = false;

            async function loadSketchnotes() {
                const response = await fetch('./index.json');
                const data = await response.json();
                rootPath = data.rootPath;
                sketchnotes = data.sketchnotes;
                buildCarousel();
            }

            function buildCarousel() {
                const carousel = document.getElementById('carousel');
                carousel.innerHTML = '';

                sketchnotes.forEach((sketchnote, index) => {
                    const item = document.createElement('div');
                    item.className = 'carousel-item';
                    item.dataset.index = index;

                    const link = document.createElement('a');
                    link.href = rootPath + sketchnote.imagePath;
                    link.target = '_blank';
                    link.title = 'Open image in new tab';

                    const img = document.createElement('img');
                    img.src = rootPath + sketchnote.imagePath;
                    img.alt = sketchnote.title;
                    img.loading = 'lazy';

                    link.appendChild(img);
                    item.appendChild(link);
                    carousel.appendChild(item);
                });

                updateCurrentInfo(0);
            }

            function updateCurrentInfo(index) {
                if (index < 0 || index >= sketchnotes.length) return;
                const sketchnote = sketchnotes[index];
                document.getElementById('current-title').textContent = sketchnote.title;
                document.getElementById('current-speaker').textContent = sketchnote.speakers.join(', ');
            }

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function spin() {
                if (isSpinning || sketchnotes.length === 0) return;

                isSpinning = true;
                const button = document.getElementById('spin-button');
                button.disabled = true;

                const carousel = document.getElementById('carousel');
                const totalItems = sketchnotes.length;
                const targetIndex = Math.floor(Math.random() * totalItems);

                const fullRotations = 3;
                const totalDistance = (fullRotations * totalItems + targetIndex) * ITEM_HEIGHT;

                const startTime = performance.now();
                const startPosition = 0;

                carousel.style.transition = 'none';
                carousel.style.transform = 'translateY(0)';

                function animate(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / SPIN_DURATION, 1);

                    const easedProgress = easeOutCubic(progress);
                    const currentPosition = startPosition + (totalDistance * easedProgress);
                    const wrappedPosition = currentPosition % (totalItems * ITEM_HEIGHT);

                    carousel.style.transform = `translateY(-${wrappedPosition}px)`;

                    const currentVisibleIndex = ((Math.round(wrappedPosition / ITEM_HEIGHT) % totalItems) + totalItems) % totalItems;
                    updateCurrentInfo(currentVisibleIndex);

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        carousel.style.transform = `translateY(-${targetIndex * ITEM_HEIGHT}px)`;
                        updateCurrentInfo(targetIndex);
                        isSpinning = false;
                        button.disabled = false;
                    }
                }

                requestAnimationFrame(animate);
            }

            document.getElementById('spin-button').addEventListener('click', spin);

            loadSketchnotes();
        </script>
    </body>
</html>
